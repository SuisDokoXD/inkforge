<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' ws: http://localhost:*; img-src 'self' data:;" />
    <title>InkForge · 墨炉</title>
  </head>
  <body class="bg-slate-950 text-slate-100 antialiased">
    <!-- 液态玻璃折射滤镜：被 .glass-panel 的边缘高光层引用，对面板背后的内容做
         轻微湍流位移折射。仅 Chromium/Electron 生效，本应用即 Electron。 -->
    <svg width="0" height="0" aria-hidden="true" style="position: absolute; pointer-events: none">
      <filter id="lglass" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
        <feTurbulence type="fractalNoise" baseFrequency="0.012 0.016" numOctaves="1" seed="42" result="noise" />
        <feGaussianBlur in="noise" stdDeviation="1.6" result="blurredNoise" />
        <feDisplacementMap in="SourceGraphic" in2="blurredNoise" scale="38" xChannelSelector="R" yChannelSelector="G" />
      </filter>
    </svg>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
